<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TheAdamEffect | Adam Syed</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #05070d;
      color: white;
      overflow-x: hidden;
    }

    .container {
      display: flex;
      min-height: 100vh;
    }

    /* LEFT SIDE (CONTENT) */
    .left {
      width: 50%;
      padding: 80px 60px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      z-index: 2;
    }

    h1 {
      font-size: 4rem;
      font-weight: 800;
      line-height: 1;
      margin-bottom: 20px;
      text-shadow: 0 0 20px rgba(255,255,255,0.2);
    }

    .sub {
      color: #aab3c5;
      line-height: 1.7;
      margin-bottom: 30px;
      max-width: 500px;
    }

    .buttons {
      display: flex;
      gap: 15px;
      margin-bottom: 40px;
    }

    .btn {
      padding: 12px 18px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 600;
    }

    .btn-primary {
      background: linear-gradient(135deg, #ffffff, #7ad8ff);
      color: black;
    }

    .btn-secondary {
      border: 1px solid rgba(255,255,255,0.2);
      color: white;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .link {
      padding: 14px;
      border-radius: 14px;
      background: rgba(255,255,255,0.05);
      text-decoration: none;
      color: white;
      transition: 0.3s;
    }

    .link:hover {
      transform: translateX(6px);
      background: rgba(255,255,255,0.08);
    }

    /* RIGHT SIDE (FLOATING IMAGE) */
    .right {
      width: 50%;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .image-wrapper {
      position: relative;
      animation: float 4s ease-in-out infinite;
    }

    .image-wrapper img {
      max-height: 85vh;
      filter: drop-shadow(0 40px 80px rgba(0,0,0,0.8));
    }

    /* Glow under feet */
    .glow {
      position: absolute;
      bottom: 0;
      width: 200px;
      height: 60px;
      background: radial-gradient(circle, rgba(255,255,255,0.3), transparent);
      filter: blur(20px);
      left: 50%;
      transform: translateX(-50%);
    }

    /* FLOAT ANIMATION */
    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-20px); }
      100% { transform: translateY(0px); }
    }

    /* RESPONSIVE */
    @media (max-width: 900px) {
      .container {
        flex-direction: column;
      }

      .left, .right {
        width: 100%;
        text-align: center;
      }

      .right img {
        max-height: 60vh;
      }

      .buttons {
        justify-content: center;
      }
    }
  </style>
</head>

<body>
  <div class="container">

    <div class="left">
      <h1>Adam<br>Syed</h1>

      <p class="sub">
        A cinematic creator presence. Content, identity, and brand all in one place.
      </p>

      <div class="buttons">
        <a href="https://www.tiktok.com/@theadameffect" target="_blank" class="btn btn-primary">TikTok</a>
        <a href="mailto:theadameffect98@gmail.com" class="btn btn-secondary">Contact</a>
      </div>

      <div class="links">
        <a class="link" href="https://www.instagram.com/theadameffect/" target="_blank">Instagram</a>
        <a class="link" href="https://www.youtube.com/results?search_query=theadameffect" target="_blank">YouTube</a>
        <a class="link" href="https://github.com/AdamSyed98" target="_blank">GitHub</a>
      </div>
    </div>

    <div class="right">
      <div class="image-wrapper">
        <img src="assets/profile.jpg" alt="Adam" />
        <div class="glow"></div>
      </div>
    </div>

  </div>
</body>
</html>
