<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TheAdamEffect | Adam Syed</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #05070d;
      color: white;
      overflow-x: hidden;
    }

    .container {
      display: flex;
      min-height: 100vh;
    }

    .left {
      width: 50%;
      padding: 80px 60px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      z-index: 2;
      background: linear-gradient(
        to right,
        rgba(5, 7, 13, 0.96) 0%,
        rgba(5, 7, 13, 0.86) 60%,
        rgba(5, 7, 13, 0.35) 100%
      );
    }

    h1 {
      font-size: 4rem;
      font-weight: 800;
      line-height: 1;
      margin-bottom: 20px;
      text-shadow: 0 0 20px rgba(255,255,255,0.2);
    }

    .sub {
      color: #aab3c5;
      line-height: 1.7;
      margin-bottom: 30px;
      max-width: 500px;
    }

    .buttons {
      display: flex;
      gap: 15px;
      margin-bottom: 40px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 12px 18px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 600;
      transition: transform 0.25s ease, opacity 0.25s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
      opacity: 0.95;
    }

    .btn-primary {
      background: linear-gradient(135deg, #ffffff, #7ad8ff);
      color: black;
    }

    .btn-secondary {
      border: 1px solid rgba(255,255,255,0.2);
      color: white;
      background: rgba(255,255,255,0.04);
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-width: 420px;
    }

    .link {
      padding: 14px 16px;
      border-radius: 14px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      text-decoration: none;
      color: white;
      transition: transform 0.3s ease, background 0.3s ease;
    }

    .link:hover {
      transform: translateX(6px);
      background: rgba(255,255,255,0.08);
    }

    .right {
      width: 50%;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at center, rgba(255,255,255,0.10), transparent 35%),
        radial-gradient(circle at top, rgba(122,216,255,0.18), transparent 30%),
        linear-gradient(to left, rgba(5,7,13,0.2), rgba(5,7,13,0.0));
    }

    .image-wrapper {
      position: relative;
      animation: float 4s ease-in-out infinite;
    }

    .image-wrapper img {
      max-height: 88vh;
      max-width: 90%;
      display: block;
      object-fit: contain;
      filter: drop-shadow(0 40px 80px rgba(0,0,0,0.8));
    }

    .glow {
      position: absolute;
      bottom: 12px;
      width: 240px;
      height: 70px;
      background: radial-gradient(circle, rgba(255,255,255,0.32), transparent 70%);
      filter: blur(22px);
      left: 50%;
      transform: translateX(-50%);
      z-index: -1;
    }

    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-20px); }
      100% { transform: translateY(0px); }
    }

    @media (max-width: 900px) {
      .container {
        flex-direction: column;
      }

      .left, .right {
        width: 100%;
      }

      .left {
        text-align: center;
        padding: 56px 24px 24px;
        background: linear-gradient(
          to bottom,
          rgba(5, 7, 13, 0.95) 0%,
          rgba(5, 7, 13, 0.82) 100%
        );
      }

      .buttons {
        justify-content: center;
      }

      .links {
        margin: 0 auto;
      }

      .right {
        padding: 10px 20px 40px;
      }

      .image-wrapper img {
        max-height: 62vh;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="left">
      <h1>Adam<br>Syed</h1>

      <p class="sub">
        A cinematic creator presence. Content, identity, and brand all in one place.
      </p>

      <div class="buttons">
        <a href="https://www.tiktok.com/@theadameffect" target="_blank" class="btn btn-primary">TikTok</a>
        <a href="mailto:theadameffect98@gmail.com" class="btn btn-secondary">Contact</a>
      </div>

      <div class="links">
        <a class="link" href="https://www.instagram.com/theadameffect/" target="_blank">Instagram</a>
        <a class="link" href="https://www.youtube.com/results?search_query=theadameffect" target="_blank">YouTube</a>
        <a class="link" href="https://github.com/AdamSyed98" target="_blank">GitHub</a>
      </div>
    </div>

    <div class="right">
      <div class="image-wrapper">
        <img src="assets/profile.jpg" alt="Adam" />
        <div class="glow"></div>
      </div>
    </div>
  </div>
</body>
</html>
